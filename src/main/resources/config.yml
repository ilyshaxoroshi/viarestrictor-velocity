# ========================================
# VersionRestrictor - Конфигурация
# ========================================

# Список разрешенных номеров протоколов
# (Эти номера соответствуют версиям Minecraft)
# Смотрите https://wiki.vg/Protocol_version_numbers для полной справки
# Примеры:
# 758 : 1.20.0
# 759 : 1.20.1
# 760 : 1.20.2
# 761 : 1.20.3
# 765 : 1.20.4
# 764 : 1.21.1
# 767 : 1.21.4
allowed_versions:
  - 759   # 1.20.1
  - 765   # 1.20.4
  - 764   # 1.21.1
  - 767   # 1.21.4

# Сообщение, показываемое игрокам, чья версия не разрешена
kick_message: |
  &cИзвините, ваша версия Minecraft не разрешена на этом сервере.
  &7Обнаруженная версия: &e%mcversion% (&f%version%&7)
  &aСовместимые версии:
  &21.20.x &7и &21.21.4

# Выводить в консоль информацию о киках
log_kicks: true
