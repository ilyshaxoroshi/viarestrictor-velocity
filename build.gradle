plugins {
    id 'java'
}

group = 'dev.viarestrictor'
version = '1.1.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()

    // Velocity artifacts (velocity-api) are hosted on PaperMC's public Maven.
    maven { url = "https://repo.papermc.io/repository/maven-public/" }

    // ViaVersion API is published in the "everything" repository.
    maven { url = "https://repo.viaversion.com/everything/" }
}

dependencies {
    def velocityApiVersion = "3.1.1"
    def viaVersionApiVersion = "4.9.3"

    compileOnly("com.velocitypowered:velocity-api:$velocityApiVersion")
    annotationProcessor("com.velocitypowered:velocity-api:$velocityApiVersion")

    compileOnly("com.viaversion:viaversion-api:$viaVersionApiVersion")

    implementation("org.yaml:snakeyaml:1.33")
}

jar {
    // Bundle runtime deps (SnakeYAML) into the plugin jar for Velocity runtime.
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    exclude 'META-INF/*.SF', 'META-INF/*.DSA', 'META-INF/*.RSA'
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}
